<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="Segoe UI, sans-serif" font-size="12">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d29922"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="#0d1117" rx="8"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#d29922" font-size="16" font-weight="bold">GrainSight Architecture</text>

  <!-- Browser box -->
  <rect x="40" y="60" width="200" height="140" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="140" y="82" text-anchor="middle" fill="#d29922" font-weight="bold">Browser (SPA)</text>
  <text x="60" y="102" fill="#8b949e">index.html</text>
  <text x="60" y="118" fill="#8b949e">app.js</text>
  <text x="60" y="134" fill="#8b949e">renderer2d.js</text>
  <text x="60" y="150" fill="#8b949e">renderer3d.js</text>
  <text x="60" y="166" fill="#8b949e">websocket.js</text>
  <text x="60" y="186" fill="#58a6ff">HTTP + WebSocket</text>

  <!-- Arrow -->
  <line x1="240" y1="130" x2="320" y2="130" stroke="#d29922" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="320" y1="145" x2="240" y2="145" stroke="#d29922" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Server box -->
  <rect x="330" y="60" width="200" height="160" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="430" y="82" text-anchor="middle" fill="#d29922" font-weight="bold">FastAPI :8010</text>
  <text x="350" y="102" fill="#8b949e">POST /api/generate</text>
  <text x="350" y="118" fill="#8b949e">POST /api/segment</text>
  <text x="350" y="134" fill="#8b949e">GET  /api/measurements</text>
  <text x="350" y="150" fill="#8b949e">GET  /api/psd</text>
  <text x="350" y="166" fill="#8b949e">POST /api/settings</text>
  <text x="350" y="182" fill="#8b949e">GET  /api/state</text>
  <text x="350" y="198" fill="#8b949e">GET  /api/export/csv</text>
  <text x="350" y="214" fill="#58a6ff">WS   /ws</text>

  <!-- Arrow to core -->
  <line x1="430" y1="225" x2="430" y2="270" stroke="#d29922" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Simulation core box -->
  <rect x="280" y="275" width="300" height="110" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="430" y="297" text-anchor="middle" fill="#d29922" font-weight="bold">Simulation Core</text>
  <text x="300" y="317" fill="#8b949e">grain_generator.py</text>
  <text x="300" y="333" fill="#8b949e">segmentation.py</text>
  <text x="300" y="349" fill="#8b949e">grain_measurement.py</text>
  <text x="460" y="317" fill="#8b949e">granulometry.py</text>
  <text x="460" y="333" fill="#8b949e">depth_features.py</text>
  <text x="460" y="349" fill="#8b949e">volume_estimation.py</text>

  <!-- Libraries -->
  <rect x="620" y="275" width="150" height="110" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="695" y="297" text-anchor="middle" fill="#d29922" font-weight="bold">Dependencies</text>
  <text x="640" y="317" fill="#8b949e">NumPy</text>
  <text x="640" y="333" fill="#8b949e">SciPy</text>
  <text x="640" y="349" fill="#8b949e">scikit-image</text>
  <text x="640" y="365" fill="#8b949e">Pillow</text>
  <text x="640" y="381" fill="#8b949e">FastAPI + Uvicorn</text>

  <line x1="580" y1="330" x2="620" y2="330" stroke="#30363d" stroke-width="1" stroke-dasharray="4"/>
</svg>
